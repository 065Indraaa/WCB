      <stop offset="0%" stop-color="#0d2010"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </radialGradient>
    <pattern id="pitch" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
