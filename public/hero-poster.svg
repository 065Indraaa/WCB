      <line x1="0" y1="60" x2="120" y2="60" stroke="#22C55E" stroke-width="0.8" opacity="0.08"/>
      <circle cx="60" cy="60" r="28" fill="none" stroke="#22C55E" stroke-width="0.8" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#g1)"/>
